<mat-card style="background-color: #b1ecb6;">
  <!-- Row 1: Team Names -->
  <mat-card-header style="display: flex; justify-content: center; text-align: center; padding-top: 1rem;">
    <mat-card-title style="font-size: 1.1rem; margin-bottom: 0;">
      {{ homeTeam }} <span style="font-weight: normal; margin: 0 0.5rem;">vs</span> {{ awayTeam }}
    </mat-card-title>
  </mat-card-header>

  <mat-card-content style="padding-top: 1rem;">
    <!-- Row 2: Home & Away goals prediction input -->
    <div class="prediction-row" style="display: flex; justify-content: center; align-items: center; gap: 1rem; margin-bottom: 1rem;">
      <input type="number" min="0" max="99" style="width: 3.5rem; height: 3rem; text-align: center; font-size: 1.5rem; padding: 0; border: 1px solid #ccc; border-radius: 4px;" [(ngModel)]="homeGoalsPrediction">
      <strong style="font-size: 2rem; color: #555;">-</strong>
      <input type="number" min="0" max="99" style="width: 3.5rem; height: 3rem; text-align: center; font-size: 1.5rem; padding: 0; border: 1px solid #ccc; border-radius: 4px;" [(ngModel)]="awayGoalsPrediction">
    </div>

    <!-- Row 3: Scorer select input -->
    <div class="prediction-row">
      <mat-form-field appearance="outline" style="width: 100%;">
        <mat-label>Scorer</mat-label>
        <mat-select [(ngModel)]="selectedScorer">
          @for (scorer of scorers; track scorer) {
            <mat-option [value]="scorer">{{ scorer }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Row 4: 3 toggle icons (Placeholder for now) -->
    <div class="prediction-row" style="display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem;">
      <mat-icon style="cursor: pointer;">sports_soccer</mat-icon>
      <mat-icon style="cursor: pointer;">star_border</mat-icon>
      <mat-icon style="cursor: pointer;">favorite_border</mat-icon>
    </div>

    <!-- Row 5: Scored points -->
    <div class="prediction-row" style="text-align: center; font-size: 1.1rem;">
      <strong>Points: </strong> {{ scoredPoints !== null ? scoredPoints : '-' }}
    </div>
  </mat-card-content>
</mat-card>
