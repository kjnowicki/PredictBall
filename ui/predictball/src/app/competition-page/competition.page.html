<div style="margin: 2rem;">
  <mat-card>
    <mat-card-header style="margin-bottom: 1rem;">
      <mat-card-title>{{ competitionName }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <mat-tab-group>
        <mat-tab label="Predictions">
          <div style="padding-top: 1.5rem;">
            <h2>Predictions</h2>
            <p>Your predictions will appear here.</p>
          </div>
        </mat-tab>

        <mat-tab label="Leagues">
          <div style="padding-top: 1.5rem; padding-bottom: 1rem;">
            <h2>Public Leagues</h2>
            <table mat-table [dataSource]="publicLeagues" style="width: 100%;">
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>League Name</th>
                <td mat-cell *matCellDef="let league">
                  <a [routerLink]="['/league', league.id]">{{ league.name }}</a>
                </td>
              </ng-container>
              
              <ng-container matColumnDef="participants">
                <th mat-header-cell *matHeaderCellDef>Participants</th>
                <td mat-cell *matCellDef="let league">{{ league.participants }}</td>
              </ng-container>
              
              <tr mat-header-row *matHeaderRowDef="leaguesDisplayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: leaguesDisplayedColumns"></tr>
            </table>
          </div>
        </mat-tab>

        <mat-tab label="Teams">
          <div style="padding-top: 1.5rem;">
            <h2>Teams</h2>
            <p>Participating teams go here.</p>
          </div>
        </mat-tab>

        <mat-tab label="About">
          <div style="padding-top: 1.5rem;">
            <h2>About</h2>
            <p>Details and rules about the competition go here.</p>
          </div>
        </mat-tab>
      </mat-tab-group>
    </mat-card-content>
  </mat-card>
</div>
