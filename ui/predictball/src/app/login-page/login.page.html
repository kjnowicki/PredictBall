<div style="display: flex; justify-content: space-evenly; align-items: flex-start; padding: 2rem;">
  <div style="width: 40%;">
    <h2>Login</h2>
    <form (ngSubmit)="onLogin()">
      <div style="margin-bottom: 1rem;">
        <label for="login-email">Email:</label>
        <input type="email" id="login-email" name="email" [(ngModel)]="loginData.email" required style="width: 100%;">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="login-password">Password:</label>
        <input type="password" id="login-password" name="password" [(ngModel)]="loginData.password" required style="width: 100%;">
      </div>
      <button type="submit">Login</button>
    </form>
  </div>

  <div style="width: 40%;">
    <h2>Register</h2>
    <form (ngSubmit)="onRegister()">
      <div style="margin-bottom: 1rem;">
        <label for="reg-email">Email:</label>
        <input type="email" id="reg-email" name="email" [(ngModel)]="registerData.email" required style="width: 100%;">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="reg-password">Password:</label>
        <input type="password" id="reg-password" name="password" [(ngModel)]="registerData.password" required style="width: 100%;">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="reg-password">Confirm Password:</label>
        <input type="password" id="reg-password" name="password" [(ngModel)]="registerData.password" required style="width: 100%;">
      </div>
      <button type="submit">Register</button>
    </form>
  </div>
</div>
