<div [style.display]="'flex'"
     [style.flex-direction]="isMobile() ? 'column' : 'row'"
     [style.justify-content]="'space-evenly'"
     [style.align-items]="isMobile() ? 'center' : 'flex-start'"
     [style.padding]="'2rem'"
     [style.gap]="'2rem'">

  <mat-card [style.width]="isMobile() ? '100%' : '40%'" [style.max-width]="isMobile() ? '400px' : 'none'">
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (loginError) {
        <div style="color: #f44336; margin-top: 1rem; font-size: 14px;">{{ loginError }}</div>
      }
      <form (ngSubmit)="onLogin()" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput type="text" id="login-username" name="username" autocomplete="username" [(ngModel)]="loginData.username" required>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" id="login-password" name="password" autocomplete="current-password" [(ngModel)]="loginData.password" required>
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit">Login</button>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card [style.width]="isMobile() ? '100%' : '40%'" [style.max-width]="isMobile() ? '400px' : 'none'">
    <mat-card-header>
      <mat-card-title>Register</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (registerError) {
        <div style="color: #f44336; margin-top: 1rem; font-size: 14px;">{{ registerError }}</div>
      }
      <form (ngSubmit)="onRegister()" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
        <mat-form-field appearance="outline">
          <mat-label>Display Name</mat-label>
          <input matInput type="text" id="reg-display-name" name="display-name" autocomplete="name" [(ngModel)]="registerData.displayName" required>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput type="text" id="reg-username" name="username" autocomplete="username" [(ngModel)]="registerData.username" required>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" id="reg-password" name="password" autocomplete="new-password" [(ngModel)]="registerData.password" required>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Confirm Password</mat-label>
          <input matInput type="password" id="reg-confirm-password" name="confirm-password" autocomplete="new-password" [(ngModel)]="registerData.password" required>
        </mat-form-field>
        <button mat-raised-button color="accent" type="submit">Register</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
