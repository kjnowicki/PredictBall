<div style="display: flex; justify-content: space-evenly; align-items: flex-start; padding: 2rem;">
  <div style="width: 40%;">
    <h2>Login</h2>
    <form (ngSubmit)="onLogin()">
      <div style="margin-bottom: 1rem;">
        <label for="login-username">Email:</label>
        <input type="text" id="login-username" name="username" autocomplete="username" [(ngModel)]="loginData.username" required style="width: 100%;">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="login-password">Password:</label>
        <input type="password" id="login-password" name="password" autocomplete="current-password" [(ngModel)]="loginData.password" required style="width: 100%;">
      </div>
      <button type="submit">Login</button>
    </form>
  </div>

  <div style="width: 40%;">
    <h2>Register</h2>
    <form (ngSubmit)="onRegister()">
      <div style="margin-bottom: 1rem;">
        <label for="reg-display-name">Display Name:</label>
        <input type="text" id="reg-display-name" name="display-name" autocomplete="name" [(ngModel)]="registerData.displayName" required style="width: 100%;">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="reg-username">Username:</label>
        <input type="text" id="reg-username" name="username" autocomplete="username" [(ngModel)]="registerData.username" required style="width: 100%;">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="reg-password">Password:</label>
        <input type="password" id="reg-password" name="password" autocomplete="new-password" [(ngModel)]="registerData.password" required style="width: 100%;">
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="reg-confirm-password">Confirm Password:</label>
        <input type="password" id="reg-confirm-password" name="confirm-password" autocomplete="new-password" [(ngModel)]="registerData.password" required style="width: 100%;">
      </div>
      <button type="submit">Register</button>
    </form>
  </div>
</div>
