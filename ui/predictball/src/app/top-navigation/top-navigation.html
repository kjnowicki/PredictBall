@if (isMobile()) {
  <mat-sidenav-container style="background: none; z-index: 1001;" [hasBackdrop]="false">
    <mat-sidenav #sidenav mode="over" [fixedInViewport]="true" style="width: 250px; border-right: 2px solid black; z-index: 1001;" (openedChange)="sidenavOpenedChange.emit($event)">
      <mat-nav-list>
        <a mat-list-item routerLink="/home" routerLinkActive="active" (click)="sidenav.close()">Home</a>
        <a mat-list-item routerLink="/profile" routerLinkActive="active" (click)="sidenav.close()">Profile</a>
        <a mat-list-item routerLink="/competitions" routerLinkActive="active" (click)="sidenav.close()">Competitions</a>
        <a mat-list-item routerLink="/about" routerLinkActive="active" (click)="sidenav.close()">About</a>
      </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
      <mat-toolbar style="background-color: #f5f5f5; color: inherit;">
        <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle sidenav">
          <mat-icon>menu</mat-icon>
        </button>
        <span style="flex: 1 1 auto;"></span>
        <button mat-icon-button (click)="logout()" aria-label="Logout" title="Logout">
          <mat-icon>logout</mat-icon>
        </button>
      </mat-toolbar>
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <div style="width: 100%; display: flex; justify-content: center; align-items: center; background-color: #f5f5f5; position: relative;">
    <nav mat-tab-nav-bar [tabPanel]="tabPanel">
      <a mat-tab-link routerLink="/home" routerLinkActive #rlaHome="routerLinkActive" [active]="rlaHome.isActive">Home</a>
      <a mat-tab-link routerLink="/profile" routerLinkActive #rlaProfile="routerLinkActive" [active]="rlaProfile.isActive">Profile</a>
      <a mat-tab-link routerLink="/competitions" routerLinkActive #rlaCompetitions="routerLinkActive" [active]="rlaCompetitions.isActive">Competitions</a>
      <a mat-tab-link routerLink="/about" routerLinkActive #rlaAbout="routerLinkActive" [active]="rlaAbout.isActive">About</a>
    </nav>
    <button mat-icon-button (click)="logout()" style="position: absolute; right: 16px;" aria-label="Logout" title="Logout">
      <mat-icon>logout</mat-icon>
    </button>
  </div>

  <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
}
